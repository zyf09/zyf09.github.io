<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="清华LOGO.png" type="image/x-icon">

  <script>;(function(){var w=parseInt(window.screen.width),s=w/640,u=navigator.userAgent.toLowerCase(),m='<meta name="viewport" content="width=640,';if(/android (\d+\.\d+)/.test(u)){if(parseFloat(RegExp.$1)>2.3)m+='minimum-scale='+s+',maximum-scale='+s+',';}else{m+='user-scalable=no,';}m+='target-densitydpi=device-dpi">';document.write(m);}());</script>
  <link rel="stylesheet" href="guide.css">

  <title>游戏指导语</title>
</head>
<body>

<div id="main" class="container">

  <div id="header">
    <img src="tsinghua_banner_2.png" width="100%">
    <h2>练习结束</h2>

    <article>
      <p>接下来你可以休息1-2分钟，</p>
      <p>然后将进入15分钟的正式实验游戏，</p>
      <p>正式游戏中，每消除一行你可以获得10分，</p>
      <p style="font-weight: bold" id="goal">请尽量在本次实验的15分钟内至少达到500分（死亡后可重开）</p>

      <br>
      <p>准备好之后点击按钮进入正式实验</p>
      <button onclick="clickButton()">开始正式游戏</button>
    </article>
  </div>

</div>

<script>

  function getUrlParameter(name){
    name = name.replace(/[]/,"\[").replace(/[]/,"\[").replace(/[]/,"\\\]");
    var regexS = "[\\?&]"+name+"=([^&#]*)";
    var regex = new RegExp( regexS );
    var results = regex.exec(window.parent.location.href );
    if( results == null ) return ""; else {
      return results[1];
    }
  };

  function clickButton() {
    var condition = getUrlParameter('condition')
    var link = '../dist/index.html?' + 'condition=' + condition;

    window.location.href=link
  }

  // 修改目标内容, b和d条件是非具体目标
  if (['b','d'].indexOf(getUrlParameter('condition'))> -1){
    document.getElementById("goal").innerHTML="请尽量在本次实验的15分钟内达到你最佳水平的分数";
  }

</script>



</body>
</html>
